{# Menu display for TV #}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Menu Display - Cafe BOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="page-tv">

    <div class="header-title">
        <h1>CAFE BOS MENU</h1>
    </div>

    <div class="carousel-container" id="carousel">
        <div class="content-wrapper">
            <div class="image-section">
                <img id="display-image" src="" alt="Menu Image"
                    onerror="this.src='https://via.placeholder.com/1000x1000/111827/d4af37?text=Menu'">
            </div>
            <div class="text-section">
                <div class="category-badge" id="display-category">Category</div>
                <h2 class="item-name" id="display-name">Item Name</h2>
                <div class="item-price" id="display-price">Rp 0</div>
            </div>
        </div>
    </div>

    <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <script id="menu-data" type="application/json">
        [
            {% for item in menus %}
            {
                "kategori": {{ item.kategori|tojson }},
                "nama": {{ item.nama|tojson }},
                "harga": {{ item.harga }},
                "gambar": {% if item.gambar %}"{{ url_for('static', filename='menu/') }}{{ item.gambar }}"{% else %}"https://via.placeholder.com/1000x1000/111827/d4af37?text={{ item.nama|urlencode }}"{% endif %}
            }{% if not loop.last %},{% endif %}
            {% endfor %}
        ]
    </script>

    <script>
        const menuItems = JSON.parse(document.getElementById('menu-data').textContent);

        let currentIndex = 0;
        const displayDuration = 7000; 
        const transitionDuration = 1200; 

        const carousel = document.getElementById('carousel');
        const imgEl = document.getElementById('display-image');
        const catEl = document.getElementById('display-category');
        const nameEl = document.getElementById('display-name');
        const priceEl = document.getElementById('display-price');
        const progressBar = document.getElementById('progress-bar');

        function updateDisplay(index) {
            const item = menuItems[index];
            carousel.classList.remove('active');
            progressBar.style.transition = 'none';
            progressBar.style.width = '0%';

            setTimeout(() => {
                imgEl.src = item.gambar;
                catEl.textContent = item.kategori;
                nameEl.textContent = item.nama;
                priceEl.textContent = "Rp " + new Intl.NumberFormat('id-ID').format(item.harga);

                carousel.classList.add('active');

                setTimeout(() => {
                    progressBar.style.transition = `width ${displayDuration}ms linear`;
                    progressBar.style.width = '100%';
                }, 100);

            }, transitionDuration);
        }

        function nextItem() {
            currentIndex = (currentIndex + 1) % menuItems.length;
            updateDisplay(currentIndex);
        }

        if (menuItems.length > 0) {
            imgEl.src = menuItems[0].gambar;
            catEl.textContent = menuItems[0].kategori;
            nameEl.textContent = menuItems[0].nama;
            priceEl.textContent = "Rp " + new Intl.NumberFormat('id-ID').format(menuItems[0].harga);
            carousel.classList.add('active');

            setTimeout(() => {
                progressBar.style.transition = `width ${displayDuration}ms linear`;
                progressBar.style.width = '100%';
            }, 100);

            setInterval(nextItem, displayDuration + transitionDuration);
        }
    </script>
</body>
</html>
