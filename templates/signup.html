<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System - Daftar Crew</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh;">

<div class="glass" style="width: 100%; max-width: 400px; padding: 50px; border-radius: 30px; text-align: center;">
    <h2 style="margin-bottom: 10px;">Daftar Crew</h2>
    <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 14px;">Isi data untuk membuat akun crew.</p>

    <form method="POST">
        <div class="input-group">
            <input type="text" name="fullname" placeholder="Nama Lengkap" required>
        </div>
        <div class="input-group">
            <input type="text" name="username" placeholder="Username" required>
        </div>
        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-primary glow-accent" style="width: 100%; margin-top: 20px; height: 55px;">Daftar</button>
    </form>

    <p style="margin-top: 20px; font-size: 13px;">Sudah punya akun? <a href="{{ url_for('login') }}">Masuk</a></p>
</div>

</body>
</html>
