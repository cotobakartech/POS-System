<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembelanjaan Multi-Produk - PT. BOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .produk-row { border-bottom: 1px solid #dee2e6; margin-bottom: 15px; padding-bottom: 15px; }

        /* Prevent iOS auto-zoom on input focus */
        input, select, textarea { font-size: 16px !important; }

        /* Responsive: stack all columns on mobile */
        @media (max-width: 767px) {
            .container { padding-left: 10px; padding-right: 10px; }
            .card-header h4 { font-size: 1.1rem; }
            .row.mb-4 > div { margin-bottom: 12px; }
            .produk-row .col-md-3,
            .produk-row .col-md-4,
            .produk-row .col-md-2 { margin-bottom: 10px; }
            .btn-remove { margin-top: 5px; }
            .btn.btn-outline-primary { width: 100%; }
            .btn.btn-success.btn-lg { padding: 14px; font-size: 16px; }
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Pembelian Member - PT. BOS</h4>
        </div>
        <div class="card-body">
            <form action="/submit_pembelian" method="POST">
                
                <div class="row mb-4">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Tanggal</label>
                        <input type="date" name="tanggal" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Nama Member</label>
                        <input type="text" name="nama_member" class="form-control" placeholder="Nama lengkap" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Jenis Order</label>
                        <select name="jenis_order" class="form-select" required>
                            <option value="FO">First Order (FO)</option>
                            <option value="RO">Repeat Order (RO)</option>
                            <option value="Luar">Di luar FO/RO</option>
                        </select>
                    </div>
                </div>

                <hr>
                <h5>Daftar Produk</h5>
                
                <div id="produk-container">
                    <div class="row produk-row align-items-end">
                        <div class="col-md-3">
                            <label class="form-label">Paket</label>
                            <select name="paket[]" class="form-select">
                                <option value="LB">Little Bos (LB)</option>
                                <option value="PB">Pra Bos (PB)</option>
                                <option value="Luar">Luar Paket</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Produk</label>
                            <select name="produk[]" class="form-select" required>
                                <option value="330000">Bos Propolis (330.000)</option>
                                <option value="450000">Bos Coffee (450.000)</option>
                                <option value="330000">Bos SOP (330.000)</option>
                                <option value="330000">Bos Sabun BOSSKIN (330.000)</option>
                                <option value="330000">Bos Serum BOSSKIN (330.000)</option>
                                <option value="660000">Bos Kalung BOS (660.000)</option>
                                <option value="15000">Gantungan Kunci (15.000)</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Jumlah</label>
                            <input type="number" name="jumlah[]" class="form-control" value="1" min="1" required>
                        </div>
                        <div class="col-md-2">
                            <button type="button" class="btn btn-danger w-100 btn-remove d-none">Hapus</button>
                        </div>
                    </div>
                </div>

                <button type="button" class="btn btn-outline-primary btn-sm mb-4" id="btn-tambah-produk">
                    + Tambah Jenis Produk Lain
                </button>

                <div class="mb-3">
                    <label class="form-label fw-bold">Keterangan Tambahan</label>
                    <textarea name="keterangan" class="form-control" rows="2" placeholder="-"></textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg">Simpan Transaksi</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Script untuk menambah baris produk secara dinamis
    const container = document.getElementById('produk-container');
    const btnTambah = document.getElementById('btn-tambah-produk');

    btnTambah.addEventListener('click', () => {
        const rows = document.querySelectorAll('.produk-row');
        const newRow = rows[0].cloneNode(true); // Clone baris pertama
        
        // Reset nilai input di baris baru
        newRow.querySelector('input[name="jumlah[]"]').value = 1;
        
        // Tampilkan tombol hapus untuk baris baru
        const removeBtn = newRow.querySelector('.btn-remove');
        removeBtn.classList.remove('d-none');
        
        // Fungsi hapus baris
        removeBtn.addEventListener('click', () => {
            newRow.remove();
        });

        container.appendChild(newRow);
    });
</script>

</body>
</html>
